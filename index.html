<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>你的灵魂像哪位导演 · Director Personality Test</title>
<meta name="description" content="20道脑洞题，21位传奇导演，找到属于你的电影人格。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
/* --- 原有样式保持不变 --- */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#07060b;--t1:#ede4d3;--t2:#9e9282;--t3:#5c5448;--red:#d4405a;--gold:#c9a84c}
html{scroll-behavior:smooth;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Serif SC','Songti SC',Georgia,serif;background:var(--bg);color:var(--t1);min-height:100vh;overflow-x:hidden}
.scr{display:none;min-height:100vh;flex-direction:column}.scr.on{display:flex}
@keyframes up{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:translateY(0)}}
.anim-up{animation:up .9s cubic-bezier(.22,1,.36,1) both}
/* ... 此处省略中间重复的 CSS 以保持篇幅，建议保留你原文件中的所有 CSS ... */

/* --- [新增] 导演照片容器样式 --- */
.rp-container {
  width: 100%;
  max-width: 480px;
  margin: 0 auto 32px;
  border: 1px solid rgba(237,228,211,0.15);
  padding: 8px;
  background: rgba(255,255,255,0.03);
  position: relative;
}
.rp-img {
  width: 100%;
  height: auto;
  display: block;
  filter: sepia(15%) contrast(1.05); /* 胶片质感微调 */
}
/* --- 原有样式继续 --- */
.rw{max-width:600px;margin:0 auto;padding:48px 20px 56px}
.rh{text-align:center;margin-bottom:40px}
.rl{font-size:11px;letter-spacing:6px;font-family:'Courier New',monospace;margin-bottom:18px;text-transform:uppercase}
.re{font-size:64px;margin-bottom:18px;display:inline-block}
.rn{font-size:clamp(24px,6.5vw,34px);font-weight:700;letter-spacing:4px;margin-bottom:6px}
.rne{font-family:'Playfair Display',serif;font-style:italic;font-size:13px;color:var(--t3)}
.rk{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-bottom:36px}
.rkw{padding:5px 14px;font-size:12px;letter-spacing:2px;border:1px solid}
.rc{background:rgba(237,228,211,.025);border:1px solid rgba(237,228,211,.05);padding:28px 24px;margin-bottom:40px}
.rdt{font-size:14.5px;line-height:2.2;color:#c4b69e}
.rwk{font-size:12.5px;color:var(--t3);font-style:italic;margin-top:18px}
.rsl{text-align:center;font-size:11px;letter-spacing:5px;color:var(--t2);font-family:'Courier New',monospace;margin-bottom:18px}
.rr{text-align:center;margin-bottom:40px}
.rr svg{width:100%;max-width:290px;display:block;margin:0 auto}
.rts{margin-bottom:40px}
.rt{margin-bottom:12px}
.rti{display:flex;justify-content:space-between;margin-bottom:4px}
.rtn{font-size:12px;color:var(--t2)}
.rtv{font-size:12px;font-family:'Courier New',monospace}
.rtk{height:3px;background:rgba(237,228,211,.05)}
.rtf{height:100%;transition:width 1.4s cubic-bezier(.22,1,.36,1)}
.r3s{margin-bottom:48px}
.r3{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid rgba(237,228,211,.04)}
.r3e{font-size:20px;width:32px;text-align:center;flex-shrink:0}
.r3r{flex:1;min-width:0}
.r3m{display:flex;justify-content:space-between;margin-bottom:4px}
.r3n{font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.r3p{font-size:12px;color:var(--t3);font-family:'Courier New',monospace;flex-shrink:0;margin-left:8px}
.r3b{height:2px;background:rgba(237,228,211,.05)}
.r3f{height:100%;transition:width 1.2s cubic-bezier(.22,1,.36,1)}
.ra{display:flex;flex-direction:column;align-items:center;gap:12px}
.rbsh{width:100%;max-width:300px;padding:15px;border:none;font-size:14.5px;font-family:inherit;font-weight:600;letter-spacing:4px;cursor:pointer;transition:all .3s}
.rbre{width:100%;max-width:300px;padding:13px;background:0 0;border:1px solid rgba(237,228,211,.12);color:var(--t2);font-size:13.5px;font-family:inherit;letter-spacing:4px;cursor:pointer;transition:all .3s}
.rfo{text-align:center;margin-top:48px;font-size:10px;color:#2e2a25;letter-spacing:3px;font-family:'Courier New',monospace}
.tst{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(30,28,36,.95);border:1px solid rgba(237,228,211,.1);color:var(--t1);padding:12px 28px;font-size:13px;z-index:10000;opacity:0;transition:all .4s ease;pointer-events:none;border-radius:2px}
.tst.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="tst" id="tst"></div>
<div class="scr on" id="s-start">
  <div class="sw anim-up">
    <div class="si">🎬</div>
    <h1 class="st">你的灵魂像哪位导演</h1>
    <p class="ss">Director Personality Test</p>
    <p class="sd">20道脑洞大开的问题<br>21位传奇导演的灵魂等待与你相遇</p>
    <button class="sb" id="go"><span>开 始 测 试</span></button>
  </div>
</div>
<div class="scr" id="s-quiz">
  <div class="qh"><div class="qp"><div class="qb"><div class="qf" id="qf"></div></div><span class="qn" id="qn"></span></div></div>
  <div class="qy"><h2 class="qt" id="qt"></h2><div class="qo" id="qo"></div></div>
</div>
<div class="scr" id="s-result"><div class="rw" id="rw"></div></div>

<script>
// =========== GitHub 图片配置 ===========
const ghUser = "1064691703canggan00-cyber";
const ghRepo = "DRTI-";
const ghFolder = "导演照片最终版";
const baseImgURL = `https://raw.githubusercontent.com/${ghUser}/${ghRepo}/main/${ghFolder}/`;

// 针对你 GitHub 文件名的特殊后缀映射表
const fileMap = {
  kubrick: "kubrick.jpg",
  miyazaki: "miyazaki.jpg.jpg",
  tarantino: "tarantino.jpg.jpg",
  wonkar: "wonkar.jpg.jpg",
  nolan: "nolan.jpg.jpg",
  fellini: "fellini.jpg.jpg",
  apichatpong: "apichatponog.jpg.jpeg", 
  bong: "bong.jpg.jpg",
  coen: "coen.jpg.jpeg",
  gerwig: "gerwig.jpg.jpg",
  hitchcock: "hitchcock.jpg.jpg",
  jia: "jia.jpg.jpg",
  koreeda: "koreeda.jpg.jpg",
  leeang: "leeang.jpg.jpg",
  lynch: "lynch.jpg.jpg",
  spielberg: "spielberg.jpg.jpg",
  tarkovsky: "tarkovsky.jpg.jpg",
  varda: "varda.jpg.jpg",
  villeneuve: "villeneuve.jpg.jpg",
  wes: "wes.jpg.jpg",
  akerman: "akerman.jpg.jpg"
};

// ... (保留你原来的 D 数据对象和 Q 题目数组) ...
var D = { /* 你的 D 数据 */ };
var Q = [ /* 你的 Q 题目数据 */ ];
// 这里省略 D 和 Q 的详细内容以保持代码简洁，请务必保留你原文件中的数据

var TL={perfectionism:"完美主义",emotion:"情感浓度",rebellion:"叛逆指数",philosophy:"哲学脑",visual:"视觉癖",narrative:"叙事力",humor:"搞笑值",humanity:"人味儿"};
var qs=[],ci=0,ans=[],busy=false;

function $(id){return document.getElementById(id)}
function show(id){document.querySelectorAll('.scr').forEach(function(s){s.classList.remove('on')});$(id).classList.add('on');window.scrollTo(0,0)}
function start(){qs=shuffle(Q);ci=0;ans=[];busy=false;render();show('s-quiz')}
function shuffle(a){var b=[].concat(a);for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t}return b}

function render(){
  var q=qs[ci],tot=qs.length,pct=(ci/tot)*100;
  $('qf').style.width=pct+'%';$('qn').textContent=(ci+1)+' / '+tot;
  $('qt').textContent=q.q;
  var box=$('qo');box.innerHTML='';
  q.o.forEach(function(opt,i){
    var b=document.createElement('button');b.className='qx';
    b.innerHTML='<span class="le">'+['A','B','C','D'][i]+'.</span>'+opt.t;
    b.onclick=function(){pick(b,opt)};
    box.appendChild(b);
  });
}

function pick(btn,opt){
  if(busy)return;busy=true;
  btn.classList.add('sel');
  ans.push(opt.s);
  setTimeout(function(){if(ci<qs.length-1){ci++;render();busy=false}else{result()}},400);
}

function result(){
  var sc={};Object.keys(D).forEach(function(k){sc[k]=0});
  ans.forEach(function(a){Object.keys(a).forEach(function(k){if(sc[k]!==undefined)sc[k]+=a[k]})});
  var sorted=Object.entries(sc).sort(function(a,b){return b[1]-a[1]});
  var wk=sorted[0][0],dir=D[wk];
  
  // 生成图片 HTML
  var fileName = fileMap[wk] || (wk + ".jpg.jpg"); 
  var imgHTML = `<div class="rp-container anim-up"><img src="${baseImgURL}${fileName}" class="rp-img" alt="${dir.name}"></div>`;

  var rs=$('s-result');
  rs.style.background='linear-gradient(175deg,'+dir.col+' 0%,#07060b 45%,'+dir.col+'44 100%)';
  
  var h='<div class="rh"><p class="rl" style="color:'+dir.ac+'">YOUR DIRECTOR PERSONALITY</p>';
  h+='<div class="re">'+dir.emoji+'</div>';
  h+='<h1 class="rn">'+dir.name+'</h1><p class="rne">'+dir.en+'</p></div>';
  
  // 插入照片
  h += imgHTML;

  h+='<div class="rk">';dir.kw.forEach(function(k){h+='<span class="rkw" style="color:'+dir.ac+';border-color:'+dir.ac+'40">'+k+'</span>'});h+='</div>';
  h+='<div class="rc"><p class="rdt">'+dir.desc+'</p><p class="rwk">代表作：'+dir.wk+'</p></div>';
  
  // (后续图表代码保持不变...)
  $('rw').innerHTML=h;show('s-result');
}

document.addEventListener('DOMContentLoaded',function(){$('go').onclick=start});
</script>
</body>
</html>
